<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire - Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container { max-width: 1200px; margin: 0 auto; animation: slideIn 0.5s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px 25px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .header-left, .header-right { display: flex; align-items: center; flex-shrink: 0; }
        .header-left img, .header-right img { height: 55px; object-fit: contain; }
        .header-center { display: flex; align-items: center; justify-content: center; text-align: center; flex: 1; }
        .header-center h1 { color: #667eea; font-size: 26px; margin: 0; }
        .header-center p { color: #666; font-size: 13px; margin: 4px 0 0 0; }
        .user-info {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 10px 0 2px; border-top: 1px solid #f0f0f0; flex-wrap: wrap;
        }
        .user-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            padding: 7px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
        }
        .btn-logout {
            background: #fff; border: 2px solid #667eea; color: #667eea; padding: 7px 18px;
            border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-logout:hover { background: #667eea; color: white; transform: translateY(-2px); }

        .tabs-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .tabs-nav { display: flex; background: #f8f9fa; border-bottom: 2px solid #e0e0e0; flex-wrap: wrap; }
        .tab-button {
            flex: 1; min-width: 130px; padding: 20px 10px; background: none; border: none; color: #666;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tab-button:hover { background: rgba(102, 126, 234, 0.1); color: #667eea; }
        .tab-button.active { color: #667eea; background: white; }
        .tab-button.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .tab-content { padding: 40px; min-height: 400px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { padding: 15px; gap: 10px; }
            .header-left img, .header-right img { height: 40px; }
            .header-center h1 { font-size: 18px; }
            .header-center p { font-size: 11px; }
            .tabs-nav { flex-direction: column; }
            .tab-button { border-bottom: 1px solid #e0e0e0; padding: 14px; font-size: 14px; }
            .tab-content { padding: 15px; }
        }
        @media (max-width: 400px) {
            .header-center h1 { font-size: 15px; }
            .header-left img, .header-right img { height: 32px; }
            .user-badge, .btn-logout { font-size: 13px; padding: 6px 14px; }
        }

        /* ===== Spécifique Maintenance ===== */
        .loading-message { text-align: center; padding: 40px; color: #666; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-message-box {
            background: #fff3cd; border: 2px solid #ffc107; border-radius: 10px; padding: 20px; margin: 20px 0;
        }
        .error-message-box h4 { color: #856404; margin-bottom: 10px; }
        .error-message-box p { color: #856404; margin: 5px 0; }

        .maint-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; flex-wrap: wrap; gap: 15px;
        }
        .btn-refresh-maint, .btn-edit-maint {
            padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-refresh-maint { background: #f8f9fa; color: #667eea; border: 2px solid #667eea; }
        .btn-refresh-maint:hover { background: #667eea; color: white; transform: translateY(-2px); }
        .btn-edit-maint { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-edit-maint:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.3); }

        .alert-banner {
            background: linear-gradient(135deg, #fef3c7 0%, #fcd34d 100%); border: 2px solid #f59e0b;
            border-radius: 15px; padding: 18px 20px; margin-bottom: 18px;
        }
        .alert-banner.danger { background: linear-gradient(135deg, #fee2e2 0%, #fca5a5 100%); border-color: #ef4444; }
        .alert-banner h3 { color: #92400e; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .alert-banner.danger h3 { color: #7f1d1d; }
        .alert-list { list-style: none; padding: 0; margin: 8px 0 0 0; }
        .alert-list li { padding: 4px 0; color: #92400e; font-weight: 600; font-size: 14px; }
        .alert-banner.danger .alert-list li { color: #7f1d1d; }

        .maint-summary {
            display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px;
        }
        .maint-summary-pill {
            flex: 1; min-width: 130px; background: white; border-radius: 12px; padding: 14px 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 10px;
        }
        .maint-summary-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .maint-summary-count { font-size: 22px; font-weight: 800; color: #333; }
        .maint-summary-label { font-size: 12px; color: #888; }

        .maint-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .maint-filter-btn {
            padding: 8px 16px; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-weight: 600; color: #666; transition: all 0.3s ease;
        }
        .maint-filter-btn:hover { background: rgba(102,126,234,0.1); border-color: #667eea; }
        .maint-filter-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; }
        .device-card {
            background: white; border-radius: 14px; padding: 18px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.25s ease;
            border-left: 6px solid #9ca3af;
        }
        .device-card:hover { transform: translateY(-3px); box-shadow: 0 8px 18px rgba(0,0,0,0.15); }
        .device-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .device-status-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
        .device-card-name { font-weight: 700; color: #333; font-size: 15px; line-height: 1.3; flex: 1; }
        .device-card-code { font-size: 11px; color: #999; font-family: 'Courier New', monospace; }
        .device-card-category {
            font-size: 11px; color: #667eea; background: #f0f0ff; padding: 2px 9px;
            border-radius: 10px; display: inline-block; margin-top: 8px;
        }
        .device-card-info { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.6; }
        .device-card-status-label { font-size: 12px; font-weight: 700; margin-top: 6px; }

        /* Modale */
        .maint-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
            align-items: center; justify-content: center; padding: 16px;
        }
        .maint-modal-overlay.open { display: flex; }
        .maint-modal {
            background: white; border-radius: 20px; width: 100%; max-width: 640px; max-height: 88vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: modalIn 0.22s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.93) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .maint-modal-header {
            position: sticky; top: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px 16px; border-radius: 20px 20px 0 0; display: flex;
            justify-content: space-between; align-items: flex-start; gap: 12px;
        }
        .maint-modal-title { color: white; font-size: 19px; font-weight: 700; line-height: 1.3; flex: 1; }
        .maint-modal-code { color: rgba(255,255,255,0.75); font-size: 12px; font-family: 'Courier New', monospace; margin-top: 4px; }
        .maint-modal-close {
            background: rgba(255,255,255,0.2); border: none; color: white; width: 34px; height: 34px;
            border-radius: 50%; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex;
            align-items: center; justify-content: center; transition: background 0.2s;
        }
        .maint-modal-close:hover { background: rgba(255,255,255,0.35); }
        .maint-modal-body { padding: 20px 24px 28px; }
        .maint-modal-category {
            display: inline-block; background: #f0f0ff; color: #667eea; border-radius: 20px;
            padding: 4px 14px; font-size: 12px; font-weight: 600; margin-bottom: 14px;
        }
        .maint-section { margin-bottom: 20px; }
        .maint-section-title {
            font-weight: 700; color: #667eea; font-size: 13px; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 8px;
        }
        .maint-info-line { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; font-size: 14px; color: #444; border-bottom: 1px dashed #eee; }
        .maint-info-line span:first-child { color: #888; }
        .maint-info-line span:last-child { font-weight: 600; text-align: right; }
        .control-chart-box { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-top: 4px; }
        .control-chart-note { font-size: 12px; color: #888; margin-top: 8px; }
        .badge-provisoire {
            display: inline-block; background: #fef3c7; color: #92400e; font-size: 11px;
            font-weight: 700; padding: 2px 10px; border-radius: 10px; margin-left: 8px;
        }
        .btn-maint-action {
            display: inline-block; margin-top: 10px; padding: 9px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-maint-action:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(102,126,234,0.35); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-top">
                <div class="header-left"><img src="logo-notre-dame.png" alt="Notre-Dame Les Oiseaux"></div>
                <div class="header-center">
                    <div><h1>🔬 Laboratoire</h1><p>Tableau de bord - Gestion d'équipe</p></div>
                </div>
                <div class="header-right"><img src="logo-ndo-sup.png" alt="NDO Sup"></div>
            </div>
            <div class="user-info">
                <span class="user-badge" id="userBadge">Utilisateur</span>
                <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs-nav">
                <button class="tab-button" onclick="window.location.href='dashboard.html?tab=0'">♻️ Gestion des Déchets</button>
                <button class="tab-button" onclick="window.location.href='dashboard.html?tab=1'">🧪 Préparation TP</button>
                <button class="tab-button" onclick="window.location.href='dashboard.html?tab=2'">📚 Préparations Particulières</button>
                <button class="tab-button" onclick="window.location.href='dashboard.html?tab=3'">🔭 Conversions Optiques</button>
                <button class="tab-button active" onclick="window.location.href='maintenance.html'">🛠️ Maintenance</button>
                <button class="tab-button" onclick="window.location.href='commandes.html'">📦 Commandes</button>
                <button class="tab-button" onclick="window.location.href='budget.html'">📊 Budget &amp; Suivi</button>
            </div>

            <div class="tab-content">
                <div class="maint-toolbar">
                    <div>
                        <h2 style="color:#667eea;margin:0;">🛠️ Maintenance des appareils</h2>
                        <p id="lastUpdateMaint" style="color:#999;font-size:12px;margin:5px 0 0 0;">Chargement…</p>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button class="btn-refresh-maint" onclick="loadAllMaintenance()">🔄 Actualiser</button>
                        <button class="btn-edit-maint" onclick="openMaintSheet()">✏️ Ouvrir le Sheet</button>
                    </div>
                </div>

                <div id="loadingMaint" class="loading-message">
                    <div class="spinner"></div>
                    <p>Chargement des données de maintenance…</p>
                </div>

                <div id="maintError" class="error-message-box" style="display:none;">
                    <h4>⚙️ Impossible de charger les données</h4>
                    <p id="maintErrorDetail"></p>
                    <button onclick="loadAllMaintenance()" style="margin-top:10px;padding:10px 20px;background:#667eea;color:white;border:none;border-radius:5px;cursor:pointer;">Réessayer</button>
                </div>

                <div id="maintContainer" style="display:none;">
                    <div id="maintSummary" class="maint-summary"></div>
                    <div id="maintAlerts"></div>
                    <div id="maintFilters" class="maint-filters"></div>
                    <div id="deviceGrid" class="device-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="maint-modal-overlay" id="maintModalOverlay" onclick="closeMaintModal(event)">
        <div class="maint-modal">
            <div class="maint-modal-header">
                <div>
                    <div class="maint-modal-title" id="maintModalTitle"></div>
                    <div class="maint-modal-code" id="maintModalCode"></div>
                </div>
                <button class="maint-modal-close" onclick="closeMaintModalDirect()">✕</button>
            </div>
            <div class="maint-modal-body" id="maintModalBody"></div>
        </div>
    </div>

    <script>
        // ===== INIT / AUTH =====
        window.addEventListener('load', function() {
            const loggedUser = localStorage.getItem('loggedUser');
            if (!loggedUser) { window.location.href = 'login.html'; return; }
            document.getElementById('userBadge').textContent = loggedUser;
            loadAllMaintenance();
        });
        function logout() {
            if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
                localStorage.removeItem('loggedUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }

        // ===== CONFIG =====
        const MAINT_SHEET_ID = '1396JSBPFtjBx_60p7H1VpQiGilTs2waHF_VaWf3QdCA';
        const MAINT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxANpx9sH21UN-SrsM9D873GUW6TjaQ7Sym5lzCh2taW1k-YzHlfQdyamWfYXIhtVBv/exec';
        function openMaintSheet() {
            window.open(`https://docs.google.com/spreadsheets/d/${MAINT_SHEET_ID}/edit`, '_blank');
        }

        // ===== ÉCRITURE (Apps Script) =====
        // Pas de header Content-Type explicite : le corps part en text/plain,
        // ce qui évite le preflight CORS que l'Apps Script ne gère pas.
        async function postToAppsScript(payload) {
            const res = await fetch(MAINT_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
            });
            const json = await res.json();
            if (json.error) throw new Error(json.error);
            return json;
        }

        async function markMaintenanceDone(code, sheetName, type) {
            const label = type === 'interne' ? 'interne' : 'externe';
            if (!confirm(`Confirmer la maintenance ${label} de "${code}" comme effectuée aujourd'hui ?`)) return;
            try {
                await postToAppsScript({ action: 'updateMaintenance', sheetName, code, type });
                closeMaintModalDirect();
                await loadAllMaintenance();
                alert('✅ Maintenance enregistrée.');
            } catch (err) {
                alert('❌ Erreur lors de l\'enregistrement : ' + err.message);
            }
        }

        async function addMeasure(code) {
            const input = document.getElementById('ccMeasureInput_' + code);
            const val = parseFloat(input.value);
            if (isNaN(val)) { alert('Entrez une valeur numérique.'); return; }
            const operateur = localStorage.getItem('loggedUser') || '';
            try {
                await postToAppsScript({ action: 'addControlMeasure', code, valeur: val, operateur });
                await loadAllMaintenance();
                const d = G.devices.find(x => x.code === code);
                if (d) openDeviceModal(d);
                else closeMaintModalDirect();
            } catch (err) {
                alert('❌ Erreur lors de l\'ajout de la mesure : ' + err.message);
            }
        }

        async function addResineReadingFromForm() {
            const get = id => document.getElementById(id).value;
            const condEntree = get('resCondEntree'), condSortie = get('resCondSortie'), ph = get('resPh');
            if (condSortie === '' && ph === '') { alert('Renseignez au moins la conductivité de sortie ou le pH.'); return; }
            const last = (G.resine && G.resine.latest) || {};
            try {
                await postToAppsScript({
                    action: 'addResineReading',
                    condEntree, condSortie, ph,
                    seuil: last.seuil || '', phMin: last.phMin || '', phMax: last.phMax || '',
                });
                await loadAllMaintenance();
                closeMaintModalDirect();
                alert('✅ Relevé enregistré.');
            } catch (err) {
                alert('❌ Erreur lors de l\'ajout du relevé : ' + err.message);
            }
        }


        const STATUT_META = {
            vert:   { color: '#10b981', label: 'À jour',          icon: '🟢', rank: 1 },
            orange: { color: '#f59e0b', label: 'À prévoir (≤30j)', icon: '🟠', rank: 2 },
            rouge:  { color: '#ef4444', label: 'En retard',        icon: '🔴', rank: 3 },
            gris:   { color: '#9ca3af', label: 'Non configuré',    icon: '⚪', rank: 0 },
        };
        function worstStatut(list) {
            return list.reduce((w, s) => (STATUT_META[s].rank > STATUT_META[w].rank ? s : w), 'gris');
        }

        // ===== CSV HELPERS =====
        function gvizUrl(sheetName) {
            return `https://docs.google.com/spreadsheets/d/${MAINT_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
        }

        function parseCSVGeneric(csv) {
            const rows = [];
            let currentRow = '', insideQuotes = false;
            for (let i = 0; i < csv.length; i++) {
                const ch = csv[i];
                if (ch === '"') { insideQuotes = !insideQuotes; currentRow += ch; }
                else if (ch === '\n' && !insideQuotes) { if (currentRow.length) rows.push(currentRow); currentRow = ''; }
                else { currentRow += ch; }
            }
            if (currentRow.length) rows.push(currentRow);
            return rows.map(row => {
                const values = []; let cur = '', inQ = false;
                for (let j = 0; j < row.length; j++) {
                    const ch = row[j];
                    if (ch === '"') { inQ = !inQ; }
                    else if (ch === ',' && !inQ) { values.push(cur); cur = ''; }
                    else { cur += ch; }
                }
                values.push(cur);
                return values.map(v => v.replace(/^"|"$/g, '').trim());
            });
        }

        async function fetchSheet(sheetName) {
            const res = await fetch(gvizUrl(sheetName));
            if (!res.ok) throw new Error(`Onglet "${sheetName}" introuvable (HTTP ${res.status})`);
            const csv = await res.text();
            return parseCSVGeneric(csv);
        }

        function rowsToObjects(rows) {
            if (!rows.length) return [];
            const header = rows[0].map(h => h.trim());
            return rows.slice(1)
                .filter(r => r.some(c => c && c.trim() !== ''))
                .map(r => {
                    const obj = {};
                    header.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
                    return obj;
                });
        }

        // ===== DATES & ÉCHÉANCES =====
        function parseDateAny(str) {
            if (!str) return null;
            str = str.trim();
            if (!str) return null;
            let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
            if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
            m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
            const d = new Date(str);
            return isNaN(d.getTime()) ? null : d;
        }

        function fmtDate(d) {
            if (!d) return '—';
            return d.toLocaleDateString('fr-FR');
        }

        function addPeriod(date, value, unit) {
            const d = new Date(date.getTime());
            if (unit === 'jours') d.setDate(d.getDate() + value);
            else if (unit === 'mois') d.setMonth(d.getMonth() + value);
            return d;
        }

        function nextVacanceAfter(date, vacances) {
            const future = vacances
                .filter(v => v.debut && v.debut.getTime() > date.getTime())
                .sort((a, b) => a.debut - b.debut);
            return future.length ? future[0].debut : null;
        }

        function normalizeApostrophe(s) {
            return (s || '').replace(/[’ʼ´`]/g, "'").trim();
        }

        // "Fin d'année scolaire" : 1×/an, calé sur l'été, en ignorant l'été imminent
        // (s'il est dans les BUFFER_DAYS qui suivent la dernière maintenance, on considère
        // qu'il vient justement d'être traité par cette maintenance).
        function nextFinAnneeAfter(date, vacances) {
            const BUFFER_DAYS = 45;
            const bufferDate = new Date(date.getTime() + BUFFER_DAYS * 86400000);
            const etes = vacances
                .filter(v => v.debut && v.periode && v.periode.toLowerCase().includes('été'))
                .filter(v => v.debut.getTime() > bufferDate.getTime())
                .sort((a, b) => a.debut - b.debut);
            if (etes.length) return { echeance: etes[0].debut, estimated: false };
            const estimated = new Date(date.getTime());
            estimated.setFullYear(estimated.getFullYear() + 1);
            return { echeance: estimated, estimated: true };
        }

        function computeSuivi(dateDerniereStr, valeurStr, uniteStrRaw, vacances) {
            const dateDerniere = parseDateAny(dateDerniereStr);
            const uniteStr = normalizeApostrophe(uniteStrRaw);
            if (!uniteStr) return { active: false, statut: 'gris' };
            if (!dateDerniere) return { active: true, statut: 'gris', echeance: null };
            let echeance, note;
            if (uniteStr === 'Vacances scolaires') {
                echeance = nextVacanceAfter(dateDerniere, vacances);
                if (!echeance) return { active: true, statut: 'gris', echeance: null, note: 'calendrier des vacances incomplet' };
            } else if (uniteStr === "Fin d'année scolaire") {
                const r = nextFinAnneeAfter(dateDerniere, vacances);
                echeance = r.echeance;
                if (r.estimated) note = "échéance estimée à +12 mois (été de l'année prochaine pas encore dans le calendrier)";
            } else {
                const val = parseFloat(valeurStr);
                if (isNaN(val)) return { active: true, statut: 'gris', echeance: null };
                echeance = addPeriod(dateDerniere, val, uniteStr);
            }
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const joursRestants = Math.ceil((echeance.getTime() - today.getTime()) / 86400000);
            let statut = joursRestants < 0 ? 'rouge' : (joursRestants <= 30 ? 'orange' : 'vert');
            return { active: true, statut, echeance, joursRestants, dateDerniere, note };
        }

        // ===== ÉTAT GLOBAL =====
        let G = { categories: [], vacances: [], devices: [], resine: null, ccDefs: {}, ccMeasures: {}, currentFilter: 'Tous' };

        async function loadAllMaintenance() {
            document.getElementById('maintContainer').style.display = 'none';
            document.getElementById('maintError').style.display = 'none';
            document.getElementById('loadingMaint').style.display = 'block';
            try {
                const [catRows, vacRows, ccDefRows, ccMesRows] = await Promise.all([
                    fetchSheet('Catégories'),
                    fetchSheet('Vacances scolaires'),
                    fetchSheet('Cartes contrôle - Définitions'),
                    fetchSheet('Cartes contrôle - Mesures'),
                ]);

                G.categories = rowsToObjects(catRows);
                G.vacances = rowsToObjects(vacRows).map(v => ({
                    periode: v['Période'], annee: v['Année scolaire'],
                    debut: parseDateAny(v['Date début']), fin: parseDateAny(v['Date fin']),
                })).filter(v => v.debut);

                G.ccDefs = {};
                rowsToObjects(ccDefRows).forEach(r => {
                    const code = r['Code appareil'];
                    if (!code) return;
                    G.ccDefs[code] = {
                        cible: r['Valeur cible/référence'] !== '' ? parseFloat(r['Valeur cible/référence']) : null,
                        limBasse: r['Limite basse'] !== '' ? parseFloat(r['Limite basse']) : null,
                        limHaute: r['Limite haute'] !== '' ? parseFloat(r['Limite haute']) : null,
                        protocole: r['Protocole de vérification'] || '',
                    };
                });
                G.ccMeasures = {};
                rowsToObjects(ccMesRows).forEach(r => {
                    const code = r['Code appareil'];
                    const val = parseFloat(r['Valeur mesurée']);
                    const date = parseDateAny(r['Date']);
                    if (!code || isNaN(val)) return;
                    if (!G.ccMeasures[code]) G.ccMeasures[code] = [];
                    G.ccMeasures[code].push({ date: date, val: val, operateur: r['Opérateur'] || '', obs: r['Observations'] || '' });
                });
                Object.values(G.ccMeasures).forEach(arr => arr.sort((a, b) => (a.date || 0) - (b.date || 0)));

                const echeanceCats = G.categories.filter(c => c['Type de suivi'] === 'Échéance');
                const seuilCats = G.categories.filter(c => c['Type de suivi'] === 'Valeur-seuil');

                const deviceSheets = await Promise.all(
                    echeanceCats.map(c => fetchSheet(c['Nom exact onglet']).then(rows => ({ cat: c, rows })))
                );

                G.devices = [];
                deviceSheets.forEach(({ cat, rows }) => {
                    rowsToObjects(rows).forEach(r => {
                        const code = r['Code/Identifiant'];
                        if (!code) return;
                        const interne = computeSuivi(r['Date dernière maintenance interne'], r['Périodicité interne (valeur)'], r['Périodicité interne (unité)'], G.vacances);
                        const externe = computeSuivi(r['Date dernière maintenance externe'], r['Périodicité externe (valeur)'], r['Périodicité externe (unité)'], G.vacances);
                        const statuts = [];
                        if (interne.active) statuts.push(interne.statut);
                        if (externe.active) statuts.push(externe.statut);
                        const statutGlobal = statuts.length ? worstStatut(statuts) : 'gris';
                        G.devices.push({
                            code, categoryDisplay: cat['Nom catégorie (affiché)'], categorySheetName: cat['Nom exact onglet'],
                            hasControlChart: (cat['Carte de contrôle'] || '').trim() === 'Oui',
                            designation: r['Désignation'] || code,
                            labo: r['Labo'], serie: r['N° de série'], dateAchat: r["Date d'achat"],
                            dateMiseEnService: r['Date de mise en service'], statutOp: r['Statut opérationnel'],
                            interne, externe, statutGlobal,
                            societe: r['Société (si externe)'], cout: r['Coût externe (€)'],
                            observations: r['Observations'] || '',
                        });
                    });
                });

                G.resine = null;
                if (seuilCats.length) {
                    const resCat = seuilCats[0];
                    const resRows = await fetchSheet(resCat['Nom exact onglet']);
                    const resObjs = rowsToObjects(resRows)
                        .map(r => ({
                            date: parseDateAny(r['Date']),
                            condEntree: r['Conductivité entrée (µS/cm)'], condSortie: r['Conductivité sortie (µS/cm)'],
                            seuil: r['Seuil alerte conductivité sortie'], ph: r['pH sortie'],
                            phMin: r['pH sortie min'], phMax: r['pH sortie max'], obs: r['Observations'] || '',
                        }))
                        .filter(r => r.date)
                        .sort((a, b) => b.date - a.date);
                    if (resObjs.length) {
                        const latest = resObjs[0];
                        const condSortie = parseFloat(latest.condSortie), seuil = parseFloat(latest.seuil);
                        const ph = parseFloat(latest.ph), phMin = parseFloat(latest.phMin), phMax = parseFloat(latest.phMax);
                        let statut = 'gris';
                        const condOk = !isNaN(condSortie) && !isNaN(seuil);
                        const phOk = !isNaN(ph) && !isNaN(phMin) && !isNaN(phMax);
                        if (condOk || phOk) {
                            let s = 'vert';
                            if ((condOk && condSortie >= seuil) || (phOk && (ph < phMin || ph > phMax))) s = 'rouge';
                            else if (condOk && condSortie >= seuil * 0.8) s = 'orange';
                            statut = s;
                        }
                        G.resine = { categoryDisplay: resCat['Nom catégorie (affiché)'], latest, history: resObjs.slice(0, 10), statutGlobal: statut };
                    } else {
                        G.resine = { categoryDisplay: resCat['Nom catégorie (affiché)'], latest: null, history: [], statutGlobal: 'gris' };
                    }
                }

                document.getElementById('loadingMaint').style.display = 'none';
                document.getElementById('maintContainer').style.display = 'block';
                const now = new Date();
                document.getElementById('lastUpdateMaint').textContent = 'Dernière mise à jour : ' + now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                renderMaintenance();
            } catch (err) {
                console.error(err);
                document.getElementById('loadingMaint').style.display = 'none';
                document.getElementById('maintError').style.display = 'block';
                document.getElementById('maintErrorDetail').textContent = err.message || String(err);
            }
        }

        // ===== RENDU =====
        function renderMaintenance() {
            renderSummaryAndAlerts();
            renderFilters();
            renderGrid();
        }

        function allItems() {
            const items = G.devices.slice();
            if (G.resine) items.push({ isResine: true, code: 'RESINES', categoryDisplay: G.resine.categoryDisplay, designation: 'Résines - Traitement eau', statutGlobal: G.resine.statutGlobal });
            return items;
        }

        function renderSummaryAndAlerts() {
            const items = allItems();
            const counts = { vert: 0, orange: 0, rouge: 0, gris: 0 };
            items.forEach(d => counts[d.statutGlobal]++);
            const summary = document.getElementById('maintSummary');
            summary.innerHTML = ['rouge', 'orange', 'vert', 'gris'].map(s => `
                <div class="maint-summary-pill">
                    <div class="maint-summary-dot" style="background:${STATUT_META[s].color};"></div>
                    <div><div class="maint-summary-count">${counts[s]}</div><div class="maint-summary-label">${STATUT_META[s].label}</div></div>
                </div>`).join('');

            const rouges = items.filter(d => d.statutGlobal === 'rouge');
            const oranges = items.filter(d => d.statutGlobal === 'orange');
            let html = '';
            if (rouges.length) {
                html += `<div class="alert-banner danger"><h3>🚨 Maintenance en retard</h3>
                    <ul class="alert-list">${rouges.map(d => `<li>• ${d.designation}</li>`).join('')}</ul></div>`;
            }
            if (oranges.length) {
                html += `<div class="alert-banner"><h3>⚠️ Échéance proche (≤ 30 jours)</h3>
                    <ul class="alert-list">${oranges.map(d => `<li>• ${d.designation}</li>`).join('')}</ul></div>`;
            }
            document.getElementById('maintAlerts').innerHTML = html;
        }

        function renderFilters() {
            const cats = ['Tous'].concat(G.categories.map(c => c['Nom catégorie (affiché)']));
            const el = document.getElementById('maintFilters');
            el.innerHTML = cats.map(c => `<button class="maint-filter-btn ${c === G.currentFilter ? 'active' : ''}" onclick="setMaintFilter('${c.replace(/'/g, "\\'")}')">${c}</button>`).join('');
        }

        function setMaintFilter(cat) {
            G.currentFilter = cat;
            renderFilters();
            renderGrid();
        }

        function renderGrid() {
            let items = allItems();
            if (G.currentFilter !== 'Tous') items = items.filter(d => d.categoryDisplay === G.currentFilter);
            const grid = document.getElementById('deviceGrid');
            if (!items.length) {
                grid.innerHTML = '<p style="color:#999;text-align:center;grid-column:1/-1;padding:30px 0;">Aucun appareil dans cette catégorie.</p>';
                return;
            }
            grid.innerHTML = items.map((d, idx) => {
                const meta = STATUT_META[d.statutGlobal];
                let infoLine = '';
                if (d.isResine) {
                    infoLine = G.resine.latest ? `Dernier relevé : ${fmtDate(G.resine.latest.date)}` : 'Aucun relevé enregistré';
                } else {
                    const parts = [];
                    if (d.interne.active && d.interne.echeance) parts.push(`Interne : ${fmtDate(d.interne.echeance)}`);
                    if (d.externe.active && d.externe.echeance) parts.push(`Externe : ${fmtDate(d.externe.echeance)}`);
                    infoLine = parts.length ? parts.join(' · ') : 'Échéance non renseignée';
                }
                return `
                <div class="device-card" style="border-left-color:${meta.color};" onclick="openItemModal(${idx}, '${G.currentFilter.replace(/'/g, "\\'")}')">
                    <div class="device-card-header">
                        <div class="device-status-dot" style="background:${meta.color};"></div>
                        <div class="device-card-name">${d.designation}</div>
                    </div>
                    <div class="device-card-code">${d.code}</div>
                    <span class="device-card-category">${d.categoryDisplay}</span>
                    <div class="device-card-info">${infoLine}</div>
                    <div class="device-card-status-label" style="color:${meta.color};">${meta.icon} ${meta.label}</div>
                </div>`;
            }).join('');
        }

        function openItemModal(idx, filter) {
            let items = allItems();
            if (filter !== 'Tous') items = items.filter(d => d.categoryDisplay === filter);
            const d = items[idx];
            if (!d) return;
            if (d.isResine) openResineModal(); else openDeviceModal(d);
        }

        function infoLine(label, value) {
            if (value === undefined || value === null || value === '') return '';
            return `<div class="maint-info-line"><span>${label}</span><span>${value}</span></div>`;
        }

        function sectionBlock(title, innerHtml) {
            if (!innerHtml) return '';
            return `<div class="maint-section"><div class="maint-section-title">${title}</div>${innerHtml}</div>`;
        }

        function suiviBlock(label, suivi, code, sheetName, type) {
            if (!suivi.active) return '';
            let lines = '';
            lines += infoLine('Statut', `${STATUT_META[suivi.statut].icon} ${STATUT_META[suivi.statut].label}`);
            lines += infoLine('Dernière maintenance', suivi.dateDerniere ? fmtDate(suivi.dateDerniere) : 'Non renseignée');
            lines += infoLine('Prochaine échéance', suivi.echeance ? fmtDate(suivi.echeance) : '—');
            if (suivi.note) lines += infoLine('Remarque', suivi.note);
            lines += `<button class="btn-maint-action" onclick="markMaintenanceDone('${code}','${sheetName}','${type}')">✅ Marquer comme effectuée aujourd'hui</button>`;
            return sectionBlock(label, lines);

        function openDeviceModal(d) {

            document.getElementById('maintModalCode').textContent = d.code;
            let body = `<div class="maint-modal-category">${d.categoryDisplay}</div>`;

            general += infoLine('Labo', d.labo);
            general += infoLine('N° de série', d.serie);
            general += infoLine("Date d'achat", d.dateAchat);
            general += infoLine('Date de mise en service', d.dateMiseEnService);

                ext += infoLine('Statut', `${STATUT_META[d.externe.statut].icon} ${STATUT_META[d.externe.statut].label}`);
                ext += infoLine('Dernière maintenance', d.externe.dateDerniere ? fmtDate(d.externe.dateDerniere) : 'Non renseignée');
                ext += infoLine('Prochaine échéance', d.externe.echeance ? fmtDate(d.externe.echeance) : '—');
                ext += infoLine('Société', d.societe);
                ext += infoLine('Coût (€)', d.cout);
                ext += `<button class="btn-maint-action" onclick="markMaintenanceDone('${d.code}','${d.categorySheetName}','externe')">✅ Marquer comme effectuée aujourd'hui</button>`;
                body += sectionBlock('🏢 Maintenance externe', ext);

            if (d.observations) body += sectionBlock('📝 Observations', `<p style="font-size:14px;color:#444;line-height:1.6;">${d.observations}</p>`);

            document.getElementById('maintModalBody').innerHTML = body;
            document.getElementById('maintModalOverlay').classList.add('open');

        function openResineModal() {
            document.getElementById('maintModalTitle').textContent = 'Résines - Traitement eau';
            document.getElementById('maintModalCode').textContent = '';
            let body = `<div class="maint-modal-category">${G.resine.categoryDisplay}</div>`;

                        hist += `<tr style="border-top:1px solid #eee;"><td style="padding:4px;">${fmtDate(r.date)}</td><td>${r.condSortie || '—'}</td><td>${r.ph || '—'}</td></tr>`;
                    });

            }
            const formHtml = `
                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
                    <div style="flex:1;min-width:110px;"><label style="font-size:12px;color:#888;">Cond. entrée</label><br>
                        <input type="number" step="any" id="resCondEntree" style="width:100%;padding:8px;border:2px solid #e0e0e0;border-radius:8px;"></div>
                    <div style="flex:1;min-width:110px;"><label style="font-size:12px;color:#888;">Cond. sortie</label><br>
                        <input type="number" step="any" id="resCondSortie" style="width:100%;padding:8px;border:2px solid #e0e0e0;border-radius:8px;"></div>
                    <div style="flex:1;min-width:90px;"><label style="font-size:12px;color:#888;">pH sortie</label><br>
                        <input type="number" step="any" id="resPh" style="width:100%;padding:8px;border:2px solid #e0e0e0;border-radius:8px;"></div>
                    <button class="btn-maint-action" style="margin:0;" onclick="addResineReadingFromForm()">➕ Ajouter le relevé du jour</button>
                </div>`;
            body += sectionBlock('➕ Nouveau relevé', formHtml);
            document.getElementById('maintModalBody').innerHTML = body;

        function closeMaintModal(event) {
            if (event.target === document.getElementById('maintModalOverlay')) closeMaintModalDirect();
        }
        function closeMaintModalDirect() {
            document.getElementById('maintModalOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMaintModalDirect(); });

        // ===== CARTES DE CONTRÔLE =====
        const MIN_POINTS_PROVISOIRE = 20;

        function controlChartSection(code, hasControlChart) {
            const def = G.ccDefs[code];
            const measures = G.ccMeasures[code] || [];
            if (!def && !measures.length && !hasControlChart) return '';

            let limBasse = def ? def.limBasse : null;
            let limHaute = def ? def.limHaute : null;
            const cible = def ? def.cible : null;
            let provisoire = false;

            if ((limBasse === null || limHaute === null) && measures.length) {
                if (measures.length >= MIN_POINTS_PROVISOIRE) {
                    const vals = measures.map(m => m.val);
                    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
                    const variance = vals.reduce((a, b) => a + (b - mean) * (b - mean), 0) / (vals.length - 1);
                    const std = Math.sqrt(variance);
                    if (limBasse === null) limBasse = mean - 3 * std;
                    if (limHaute === null) limHaute = mean + 3 * std;
                    provisoire = true;
                }
            }

            let inner = '';
            if (!measures.length) {
                inner = `<p style="color:#888;font-size:13px;">Aucune mesure enregistrée pour le moment. Les limites se calculeront automatiquement dès ${MIN_POINTS_PROVISOIRE} mesures si elles ne sont pas fixées manuellement dans le Sheet.</p>`;
            } else {
                const points = measures.filter(m => m.date).map(m => ({ date: m.date, val: m.val }));
                inner = `<div class="control-chart-box">${buildControlChartSVG(points, limBasse, limHaute, cible)}</div>`;
                if (limBasse === null || limHaute === null) {
                    inner += `<p class="control-chart-note">Pas encore assez de mesures pour calculer des limites (${measures.length}/${MIN_POINTS_PROVISOIRE}).</p>`;
                } else if (provisoire) {
                    inner += `<p class="control-chart-note">Limites calculées automatiquement (moyenne ± 3σ sur ${measures.length} mesures) <span class="badge-provisoire">PROVISOIRE</span> — saisissez des limites dans "Cartes contrôle - Définitions" pour les figer.</p>`;
                } else {
                    inner += `<p class="control-chart-note">Limites validées manuellement : ${limBasse} – ${limHaute}${cible !== null ? ` (cible ${cible})` : ''}.</p>`;
                }
            }
            inner += `
                <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
                    <input type="number" step="any" id="ccMeasureInput_${code}" placeholder="Nouvelle valeur mesurée" style="flex:1;padding:8px;border:2px solid #e0e0e0;border-radius:8px;">
                    <button class="btn-maint-action" style="margin:0;" onclick="addMeasure('${code}')">➕ Ajouter</button>
                </div>`;
            if (def && def.protocole) {
                inner += `<div style="margin-top:10px;"><strong style="font-size:13px;color:#667eea;">Protocole de vérification :</strong><p style="font-size:13px;color:#444;margin-top:4px;line-height:1.6;">${def.protocole}</p></div>`;
            }
            return sectionBlock('📈 Carte de contrôle', inner);
        }

        function buildControlChartSVG(points, limBasse, limHaute, cible) {
            const W = 560, H = 240, PAD_L = 55, PAD_R = 20, PAD_T = 20, PAD_B = 30;
            const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
            if (!points.length) return '<p style="color:#888;font-size:13px;">Pas de mesures datées à afficher.</p>';
            let vals = points.map(p => p.val);
            if (limBasse !== null) vals.push(limBasse);
            if (limHaute !== null) vals.push(limHaute);
            if (cible !== null) vals.push(cible);
            let yMin = Math.min(...vals), yMax = Math.max(...vals);
            if (yMin === yMax) { yMin -= 1; yMax += 1; }
            const margin = (yMax - yMin) * 0.18;
            yMin -= margin; yMax += margin;
            const xFor = i => PAD_L + (points.length <= 1 ? plotW / 2 : (i / (points.length - 1)) * plotW);
            const yFor = v => PAD_T + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

            let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;font-family:'Segoe UI',sans-serif;">`;
            svg += `<line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${PAD_T + plotH}" stroke="#ccc"/>`;
            svg += `<line x1="${PAD_L}" y1="${PAD_T + plotH}" x2="${PAD_L + plotW}" y2="${PAD_T + plotH}" stroke="#ccc"/>`;
            if (limHaute !== null) {
                const y = yFor(limHaute);
                svg += `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L + plotW}" y2="${y}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/>`;
                svg += `<text x="${PAD_L + plotW}" y="${y - 5}" font-size="10" fill="#ef4444" text-anchor="end">Haute ${limHaute.toFixed(2)}</text>`;
            }
            if (limBasse !== null) {
                const y = yFor(limBasse);
                svg += `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L + plotW}" y2="${y}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/>`;
                svg += `<text x="${PAD_L + plotW}" y="${y + 13}" font-size="10" fill="#ef4444" text-anchor="end">Basse ${limBasse.toFixed(2)}</text>`;
            }
            if (cible !== null) {
                const y = yFor(cible);
                svg += `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L + plotW}" y2="${y}" stroke="#667eea" stroke-width="1.5" stroke-dasharray="2,3"/>`;
            }
            if (points.length > 1) {
                const pts = points.map((p, i) => `${xFor(i)},${yFor(p.val)}`).join(' ');
                svg += `<polyline points="${pts}" fill="none" stroke="#764ba2" stroke-width="2"/>`;
            }
            points.forEach((p, i) => {
                const outside = (limBasse !== null && p.val < limBasse) || (limHaute !== null && p.val > limHaute);
                svg += `<circle cx="${xFor(i)}" cy="${yFor(p.val)}" r="4" fill="${outside ? '#ef4444' : '#667eea'}"/>`;
            });
            svg += `</svg>`;
            return svg;
        }
    </script>
</body>
</html>
