<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire - Préparation TP</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-top">
                <div class="header-left"><img src="logo-notre-dame.png" alt="Notre-Dame Les Oiseaux"></div>
                <div class="header-center">
                    <div><h1>🔬 Laboratoire</h1><p>Tableau de bord - Gestion d'équipe</p></div>
                </div>
                <div class="header-right"><img src="logo-ndo-sup.png" alt="NDO Sup"></div>
            </div>
            <div class="user-info">
                <span class="user-badge" id="userBadge">Utilisateur</span>
                <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs-nav" id="tabsNav"></div>

            <div class="tab-content">
                <div class="content-section active" id="sectionTP">
                    <h2 style="color: #667eea; margin-bottom: 30px; text-align: center;">
                        🧪 Aide à la Préparation des TP
                    </h2>

                    <div class="calculator-container">
                        <div class="calc-card">
                            <h3>Type de produit chimique</h3>
                            <div class="button-group">
                                <button class="type-btn active" onclick="selectType('solide')">📦 Solide</button>
                                <button class="type-btn" onclick="selectType('liquide')">💧 Liquide</button>
                                <button class="type-btn" onclick="selectType('eauoxygenee')">🧴 Eau oxygénée (volumes)</button>
                                <button class="type-btn" onclick="selectType('degre')">🌡️ Liquide (degré)</button>
                            </div>
                        </div>

                        <div id="formSolide" class="calc-card">
                            <h3>📦 Calcul pour Solide</h3>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Nom du produit</label>
                                    <input type="text" id="nomProduitSolide" placeholder="Ex: NaCl">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Concentration souhaitée (mol/L)</label>
                                    <input type="number" id="concentrationSolide" placeholder="Ex: 0.1" step="0.001">
                                </div>
                                <div class="input-group">
                                    <label>Volume de solution (mL)</label>
                                    <input type="number" id="volumeSolide" placeholder="Ex: 500" step="1">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Masse molaire (g/mol)</label>
                                    <input type="number" id="masseMolaire" placeholder="Ex: 58.44" step="0.01">
                                </div>
                                <div class="input-group">
                                    <label>Pureté (%)</label>
                                    <input type="number" id="pureteSolide" placeholder="Ex: 99.5" step="0.1" value="100">
                                </div>
                            </div>
                            <button class="btn-calculate" onclick="calculateSolide()">Calculer la masse à peser</button>
                            <div id="resultSolide" class="result-box"></div>
                        </div>

                        <div id="formLiquide" class="calc-card" style="display: none;">
                            <h3>💧 Calcul pour Liquide</h3>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Nom du produit</label>
                                    <input type="text" id="nomProduitLiquide" placeholder="Ex: Éthanol">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Concentration souhaitée (mol/L)</label>
                                    <input type="number" id="concentrationLiquide" placeholder="Ex: 0.5" step="0.001">
                                </div>
                                <div class="input-group">
                                    <label>Volume de solution (mL)</label>
                                    <input type="number" id="volumeLiquide" placeholder="Ex: 1000" step="1">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Masse molaire (g/mol)</label>
                                    <input type="number" id="masseMolaireLiquide" placeholder="Ex: 46.07" step="0.01">
                                </div>
                                <div class="input-group">
                                    <label>Densité (g/mL)</label>
                                    <input type="number" id="densite" placeholder="Ex: 0.789" step="0.001">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Pureté (%)</label>
                                    <input type="number" id="pureteLiquide" placeholder="Ex: 95" step="0.1" value="100">
                                </div>
                            </div>
                            <button class="btn-calculate" onclick="calculateLiquide()">Calculer le volume à prélever</button>
                            <div id="resultLiquide" class="result-box"></div>
                        </div>

                        <div id="formEauOxygenee" class="calc-card" style="display: none;">
                            <h3>🧴 Calcul pour Eau Oxygénée (en volumes)</h3>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Titre en volumes initial (Vol)</label>
                                    <input type="number" id="volumesInitial" placeholder="Ex: 110" step="1">
                                    <small style="color: #666;">1 volume = 0,3% H₂O₂</small>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Titre en volumes souhaité (Vol)</label>
                                    <input type="number" id="volumesFinal" placeholder="Ex: 10" step="1">
                                </div>
                                <div class="input-group">
                                    <label>Volume final de solution (mL)</label>
                                    <input type="number" id="volumeEauOxygenee" placeholder="Ex: 1000" step="1">
                                </div>
                            </div>
                            <button class="btn-calculate" onclick="calculateEauOxygenee()">Calculer le volume à prélever</button>
                            <div id="resultEauOxygenee" class="result-box"></div>
                        </div>

                        <div id="formDegre" class="calc-card" style="display: none;">
                            <h3>🌡️ Calcul pour Liquide en Degré (alcool)</h3>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Nom du produit</label>
                                    <input type="text" id="nomProduitDegre" placeholder="Ex: Éthanol">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Degré initial (°)</label>
                                    <input type="number" id="degreInitial" placeholder="Ex: 95" step="0.1">
                                    <small style="color: #666;">% volumique d'alcool</small>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="input-group">
                                    <label>Degré souhaité (°)</label>
                                    <input type="number" id="degreFinal" placeholder="Ex: 70" step="0.1">
                                </div>
                                <div class="input-group">
                                    <label>Volume final de solution (mL)</label>
                                    <input type="number" id="volumeDegre" placeholder="Ex: 500" step="1">
                                </div>
                            </div>
                            <button class="btn-calculate" onclick="calculateDegre()">Calculer le volume à prélever</button>
                            <div id="resultDegre" class="result-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="nav.config.js"></script>
    <script src="common.js"></script>
    <script>
        window.addEventListener('load', function () {
            initModulePage('tp');
        });

        function selectType(type) {
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('formSolide').style.display = 'none';
            document.getElementById('formLiquide').style.display = 'none';
            document.getElementById('formEauOxygenee').style.display = 'none';
            document.getElementById('formDegre').style.display = 'none';
            document.querySelectorAll('.result-box').forEach(box => box.classList.remove('show'));
            switch (type) {
                case 'solide': document.getElementById('formSolide').style.display = 'block'; break;
                case 'liquide': document.getElementById('formLiquide').style.display = 'block'; break;
                case 'eauoxygenee': document.getElementById('formEauOxygenee').style.display = 'block'; break;
                case 'degre': document.getElementById('formDegre').style.display = 'block'; break;
            }
        }

        function calculateSolide() {
            const nom = document.getElementById('nomProduitSolide').value;
            const concentration = parseFloat(document.getElementById('concentrationSolide').value);
            const volume = parseFloat(document.getElementById('volumeSolide').value);
            const masseMolaire = parseFloat(document.getElementById('masseMolaire').value);
            const purete = parseFloat(document.getElementById('pureteSolide').value) || 100;
            if (!nom || isNaN(concentration) || isNaN(volume) || isNaN(masseMolaire)) { alert('Veuillez remplir tous les champs'); return; }
            const volumeL = volume / 1000;
            const masseTheorique = concentration * volumeL * masseMolaire;
            const masseReelle = masseTheorique * (100 / purete);
            const resultBox = document.getElementById('resultSolide');
            resultBox.innerHTML = `
                <h4>✅ Résultat du calcul</h4>
                <p><strong>Produit :</strong> ${nom}</p>
                <p><strong>Concentration finale :</strong> ${concentration} mol/L</p>
                <p><strong>Volume de solution :</strong> ${volume} mL</p>
                <p><strong>Pureté du produit :</strong> ${purete}%</p>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
                <div class="result-highlight">Masse à peser : ${masseReelle.toFixed(3)} g</div>
                ${purete < 100 ? `<p style="font-size: 13px; color: #666; margin-top: 5px;">(Masse théorique pure : ${masseTheorique.toFixed(3)} g)</p>` : ''}
                <p style="font-size: 14px; color: #666; margin-top: 10px;">💡 Peser ${masseReelle.toFixed(3)} g de ${nom} et compléter à ${volume} mL avec le solvant approprié.</p>
            `;
            resultBox.classList.add('show');
        }

        function calculateLiquide() {
            const nom = document.getElementById('nomProduitLiquide').value;
            const concentration = parseFloat(document.getElementById('concentrationLiquide').value);
            const volume = parseFloat(document.getElementById('volumeLiquide').value);
            const masseMolaire = parseFloat(document.getElementById('masseMolaireLiquide').value);
            const densite = parseFloat(document.getElementById('densite').value);
            const purete = parseFloat(document.getElementById('pureteLiquide').value) || 100;
            if (!nom || isNaN(concentration) || isNaN(volume) || isNaN(masseMolaire) || isNaN(densite)) { alert('Veuillez remplir tous les champs'); return; }
            const volumeL = volume / 1000;
            const masseTheorique = concentration * volumeL * masseMolaire;
            const masseReelle = masseTheorique * (100 / purete);
            const volumePrelevement = masseReelle / densite;
            const resultBox = document.getElementById('resultLiquide');
            resultBox.innerHTML = `
                <h4>✅ Résultat du calcul</h4>
                <p><strong>Produit :</strong> ${nom}</p>
                <p><strong>Concentration finale :</strong> ${concentration} mol/L</p>
                <p><strong>Volume de solution :</strong> ${volume} mL</p>
                <p><strong>Pureté du produit :</strong> ${purete}%</p>
                <p><strong>Masse nécessaire :</strong> ${masseReelle.toFixed(3)} g</p>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
                <div class="result-highlight">Volume à prélever : ${volumePrelevement.toFixed(2)} mL</div>
                ${purete < 100 ? `<p style="font-size: 13px; color: #666; margin-top: 5px;">(Volume théorique si pur : ${(masseTheorique / densite).toFixed(2)} mL)</p>` : ''}
                <p style="font-size: 14px; color: #666; margin-top: 10px;">💡 Prélever ${volumePrelevement.toFixed(2)} mL de ${nom} et compléter à ${volume} mL avec le solvant approprié.</p>
            `;
            resultBox.classList.add('show');
        }

        function calculateEauOxygenee() {
            const volumesInitial = parseFloat(document.getElementById('volumesInitial').value);
            const volumesFinal = parseFloat(document.getElementById('volumesFinal').value);
            const volumeSolution = parseFloat(document.getElementById('volumeEauOxygenee').value);
            if (isNaN(volumesInitial) || isNaN(volumesFinal) || isNaN(volumeSolution)) { alert('Veuillez remplir tous les champs'); return; }
            const volumePrelevement = (volumesFinal * volumeSolution) / volumesInitial;
            const volumeEau = volumeSolution - volumePrelevement;
            const pourcentageInitial = (volumesInitial * 0.3).toFixed(1);
            const pourcentageFinal = (volumesFinal * 0.3).toFixed(1);
            const resultBox = document.getElementById('resultEauOxygenee');
            resultBox.innerHTML = `
                <h4>✅ Résultat du calcul</h4>
                <p><strong>Eau oxygénée initiale :</strong> ${volumesInitial} volumes (≈ ${pourcentageInitial}% H₂O₂)</p>
                <p><strong>Solution finale souhaitée :</strong> ${volumesFinal} volumes (≈ ${pourcentageFinal}% H₂O₂)</p>
                <p><strong>Volume final :</strong> ${volumeSolution} mL</p>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
                <div class="result-highlight">Volume à prélever : ${volumePrelevement.toFixed(2)} mL</div>
                <p style="font-size: 14px; color: #666; margin-top: 10px;">💡 Prélever ${volumePrelevement.toFixed(2)} mL d'eau oxygénée à ${volumesInitial} volumes<br>et compléter avec ${volumeEau.toFixed(2)} mL d'eau distillée.</p>
            `;
            resultBox.classList.add('show');
        }

        function calculateDegre() {
            const nom = document.getElementById('nomProduitDegre').value;
            const degreInitial = parseFloat(document.getElementById('degreInitial').value);
            const degreFinal = parseFloat(document.getElementById('degreFinal').value);
            const volumeSolution = parseFloat(document.getElementById('volumeDegre').value);
            if (!nom || isNaN(degreInitial) || isNaN(degreFinal) || isNaN(volumeSolution)) { alert('Veuillez remplir tous les champs'); return; }
            const volumePrelevement = (degreFinal * volumeSolution) / degreInitial;
            const volumeEau = volumeSolution - volumePrelevement;
            const resultBox = document.getElementById('resultDegre');
            resultBox.innerHTML = `
                <h4>✅ Résultat du calcul</h4>
                <p><strong>Produit :</strong> ${nom}</p>
                <p><strong>Degré initial :</strong> ${degreInitial}°</p>
                <p><strong>Degré souhaité :</strong> ${degreFinal}°</p>
                <p><strong>Volume final :</strong> ${volumeSolution} mL</p>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
                <div class="result-highlight">Volume à prélever : ${volumePrelevement.toFixed(2)} mL</div>
                <p style="font-size: 14px; color: #666; margin-top: 10px;">💡 Prélever ${volumePrelevement.toFixed(2)} mL de ${nom} à ${degreInitial}°<br>et compléter avec ${volumeEau.toFixed(2)} mL d'eau distillée pour obtenir ${volumeSolution} mL à ${degreFinal}°.</p>
            `;
            resultBox.classList.add('show');
        }
    </script>
</body>
</html>
